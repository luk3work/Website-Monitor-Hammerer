name: Deploy (Mittwald)

# Deploy bei Push auf main – plus manuell auslösbar.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_demo_seed:
        description: 'Demo-Daten einspielen (4 Beispiel-Kunden/Sites)'
        type: boolean
        default: false

# Verhindert parallele Deploys, die sich gegenseitig überholen.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Fehlt das Mittwald-Secret, schlägt der Deploy bewusst ROT fehl, statt
      # still "grün" durchzulaufen ohne irgendetwas zu deployen (Trugschluss).
      - name: Mittwald-Konfiguration prüfen
        id: cfg
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
        run: |
          if [ -z "${MITTWALD_API_TOKEN}" ]; then
            echo "::error::MITTWALD_API_TOKEN fehlt – es wird NICHTS deployt. Secret unter Repo → Settings → Secrets and variables → Actions hinterlegen."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Mittwald-Secret vorhanden – Deploy wird ausgeführt."

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup PHP
        if: steps.cfg.outputs.ready == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Composer install (ohne Dev)
        if: steps.cfg.outputs.ready == 'true'
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      # Deployer/Mittwald-Recipe liegen in require-dev -> für den Deploy-Lauf separat holen.
      - name: Deployer + Mittwald-Recipe bereitstellen
        if: steps.cfg.outputs.ready == 'true'
        run: composer require --dev deployer/deployer mittwald/deployer-recipes -W --no-interaction

      - name: SSH-Keys schreiben
        if: steps.cfg.outputs.ready == 'true'
        env:
          MITTWALD_SSH_PRIVATE_KEY: ${{ secrets.MITTWALD_SSH_PRIVATE_KEY }}
          MITTWALD_SSH_PUBLIC_KEY: ${{ secrets.MITTWALD_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p .mw-deploy
          echo "${MITTWALD_SSH_PRIVATE_KEY}" > .mw-deploy/id_rsa
          echo "${MITTWALD_SSH_PUBLIC_KEY}" > .mw-deploy/id_rsa.pub
          chmod 600 .mw-deploy/id_rsa*

      # Mit der Mittwald-Recipe wird der Host-Key nicht vorab benötigt:
      # unbekannte Hosts beim ersten Kontakt akzeptieren.
      - name: SSH known_hosts (accept-new)
        if: steps.cfg.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # Server-.env aus Secrets erzeugen (wird im Deploy nach shared hochgeladen).
      # Werte ohne echo -> erscheinen nicht im Log; GitHub maskiert Secrets zusätzlich.
      - name: Server-.env erzeugen
        if: steps.cfg.outputs.ready == 'true'
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          cat > .env.deploy <<EOF
          APP_NAME="Ops Cockpit"
          APP_ENV=production
          APP_KEY=${APP_KEY}
          APP_DEBUG=false
          APP_URL=https://webmonitor.hammerer.at
          LOG_CHANNEL=stack
          LOG_LEVEL=error
          DB_CONNECTION=mysql
          DB_HOST=mysql-bgrsle.pg-s-sd41il.db.project.host
          DB_PORT=3306
          DB_DATABASE=mysql_bgrsle
          DB_USERNAME=dbu_bgrsle
          DB_PASSWORD="${DB_PASSWORD}"
          SESSION_DRIVER=database
          CACHE_STORE=database
          QUEUE_CONNECTION=database
          ADMIN_NAME="Lukas Wagner"
          ADMIN_EMAIL=wagner@hammerer.at
          ADMIN_PASSWORD="${ADMIN_PASSWORD}"
          EOF

      - name: Deploy ausführen
        if: steps.cfg.outputs.ready == 'true'
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
        run: |
          ./vendor/bin/dep deploy \
            -o mittwald_app_id=${{ secrets.MITTWALD_APP_ID }} \
            -o mittwald_ssh_public_key_file=.mw-deploy/id_rsa.pub \
            -o mittwald_ssh_private_key_file=.mw-deploy/id_rsa \
            -o run_demo_seed=${{ inputs.run_demo_seed || 'false' }}

      # OPcache im FPM-Worker leeren: Symlink-Deploys halten sonst alten Bytecode
      # (Mittwald ignoriert .user.ini, cachetool-Flush der Recipe greift nicht).
      - name: OPcache zurücksetzen
        if: steps.cfg.outputs.ready == 'true'
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          TOKEN=$(php -r '$k=trim((string) getenv("APP_KEY"), " \t\"\x27"); echo substr(hash("sha256", $k), 0, 32);')
          ok=0
          for n in 1 2 3 4 5; do
            RESP=$(curl -fsS --max-time 30 "https://webmonitor.hammerer.at/_opcache_reset.php?token=$TOKEN" 2>/dev/null || true)
            echo "OPcache-Reset Versuch $n: ${RESP:-<keine Antwort>}"
            if [ "$RESP" = "reset-ok" ]; then ok=1; break; fi
            sleep 4
          done
          [ "$ok" = "1" ] || echo "::warning::OPcache-Reset nicht bestätigt – ggf. APP_KEY-Secret prüfen."

name: Deploy (Mittwald)

# Deploy bei Push auf main – plus manuell auslösbar.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Verhindert parallele Deploys, die sich gegenseitig überholen.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Solange Mittwald noch nicht eingerichtet ist (keine Secrets), wird der
      # Deploy sauber übersprungen statt rot fehlzuschlagen.
      - name: Mittwald-Konfiguration prüfen
        id: cfg
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
        run: |
          if [ -n "${MITTWALD_API_TOKEN}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mittwald noch nicht konfiguriert (keine Secrets) – Deploy wird übersprungen."
          fi

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup PHP
        if: steps.cfg.outputs.ready == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Composer install (ohne Dev)
        if: steps.cfg.outputs.ready == 'true'
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      # Deployer/Mittwald-Recipe liegen in require-dev -> für den Deploy-Lauf separat holen.
      - name: Deployer + Mittwald-Recipe bereitstellen
        if: steps.cfg.outputs.ready == 'true'
        run: composer require --dev deployer/deployer mittwald/deployer-recipes -W --no-interaction

      - name: SSH-Keys schreiben
        if: steps.cfg.outputs.ready == 'true'
        env:
          MITTWALD_SSH_PRIVATE_KEY: ${{ secrets.MITTWALD_SSH_PRIVATE_KEY }}
          MITTWALD_SSH_PUBLIC_KEY: ${{ secrets.MITTWALD_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p .mw-deploy
          echo "${MITTWALD_SSH_PRIVATE_KEY}" > .mw-deploy/id_rsa
          echo "${MITTWALD_SSH_PUBLIC_KEY}" > .mw-deploy/id_rsa.pub
          chmod 600 .mw-deploy/id_rsa*

      # Host-Key vorab eintragen (sicherer als StrictHostKeyChecking=accept-new).
      - name: SSH-Host-Key eintragen
        if: steps.cfg.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MITTWALD_SSH_HOST_KEY }}" > ~/.ssh/known_hosts

      - name: Deploy ausführen
        if: steps.cfg.outputs.ready == 'true'
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
        run: |
          ./vendor/bin/dep deploy \
            -o mittwald_app_id=${{ secrets.MITTWALD_APP_ID }} \
            -o mittwald_ssh_public_key_file=.mw-deploy/id_rsa.pub \
            -o mittwald_ssh_private_key_file=.mw-deploy/id_rsa

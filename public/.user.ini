; PHP-FPM soll geänderte Dateien sofort übernehmen.
; Bei atomaren Symlink-Deploys (Deployer) hält OPcache sonst das
; kompilierte PHP der vorherigen Release fest -> neue Code-Fixes
; greifen erst nach FPM-Neustart. validate_timestamps=1 lässt OPcache
; per mtime revalidieren, revalidate_freq=0 = bei jedem Request prüfen.
opcache.validate_timestamps=1
opcache.revalidate_freq=0
